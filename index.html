<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="A polished dark-themed Swagger UI showcase featuring every OpenAPI 3.1 capability — live and interactive." />
  <title>Swagger Dark UI — Full OpenAPI Showcase</title>
  <script>
    // Apply saved theme before first paint to avoid a flash of wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('sdui-theme');
        if (t === 'light' || t === 'dark') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch (e) { /* localStorage unavailable — keep default */ }
    })();
  </script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%99%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.32.8/swagger-ui.css"
        integrity="sha384-9Q2fpS+xeS4ffJy6CagnwoUl+4ldAYhOs9pgZuEKxypVModhmZFzeMlvVsAjf7uT" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.css"
        integrity="sha384-zaeBlB/vwYsDRSlFajnDd7OydJ0cWk+c2OWybl3eSUf6hW2EbhlCsQPqKr3gkznT" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
  <header class="sdui-header">
    <div class="sdui-brand">
      <svg class="sdui-logo" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v2h-2V7zm-3 3h2v2H8v-2zm6 0h2v2h-2v-2zm-3 3h2v4h-2v-4z"/>
      </svg>
      <div class="sdui-titles">
        <span class="sdui-title">Swagger Dark UI</span>
        <span class="sdui-subtitle">OpenAPI 3.1 full-feature showcase</span>
      </div>
    </div>
    <div class="sdui-controls">
      <label class="sdui-select-wrap">
        <span class="sdui-select-label">Spec</span>
        <select id="spec-select" aria-label="Select API specification">
          <option value="demo">Demo API — full feature showcase</option>
          <option value="petstore">Swagger Petstore (live)</option>
          <option value="custom">My API — YAML editor</option>
        </select>
      </label>
      <button id="theme-toggle" class="sdui-toggle" type="button" aria-label="Toggle dark / light theme" title="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M12.1 22c-5.5 0-10-4.5-10-10 0-4.6 3.1-8.6 7.6-9.7.6-.2 1.1.5.8 1-.5 1.1-.8 2.3-.8 3.5 0 4.4 3.6 8 8 8 1.2 0 2.4-.3 3.5-.8.5-.3 1.2.2 1 .8-1.2 4.4-5.2 7.2-10.1 7.2z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-15h.01M12 21h.01M4.2 4.2l.01.01M19.8 19.8l.01.01M2 12h.01M22 12h.01M4.2 19.8l.01-.01M19.8 4.2l.01-.01"/>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="1.5" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22.5"/>
            <line x1="1.5" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22.5" y2="12"/>
            <line x1="4.6" y1="4.6" x2="6.4" y2="6.4"/><line x1="17.6" y1="17.6" x2="19.4" y2="19.4"/>
            <line x1="4.6" y1="19.4" x2="6.4" y2="17.6"/><line x1="17.6" y1="6.4" x2="19.4" y2="4.6"/>
          </g>
        </svg>
      </button>
      <a class="sdui-gh" href="https://github.com/dikeckaan/swagger-dark-ui" target="_blank" rel="noopener" aria-label="View source on GitHub" title="View source on GitHub">
        <svg viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
        </svg>
      </a>
    </div>
  </header>

  <div id="workspace">
    <aside id="editor-pane" hidden>
      <div class="sdui-editor-toolbar">
        <span class="sdui-editor-title">OpenAPI source</span>
        <div class="sdui-editor-actions">
          <button id="editor-load-url" class="sdui-tool-btn" type="button" title="Fetch a spec from a URL into the editor">Load URL</button>
          <button id="editor-open-file" class="sdui-tool-btn" type="button" title="Open a local YAML/JSON file">Open file</button>
          <button id="editor-download" class="sdui-tool-btn" type="button" title="Download the current spec as YAML">Download</button>
          <button id="editor-reset" class="sdui-tool-btn" type="button" title="Replace the editor content with the starter template">Reset</button>
        </div>
        <input id="editor-file-input" type="file" accept=".yaml,.yml,.json,.txt" hidden />
      </div>
      <div id="editor-url-row" hidden>
        <input id="editor-url-input" type="url" placeholder="https://api.example.com/openapi.yaml (server must allow CORS)" spellcheck="false" />
        <button id="editor-url-go" class="sdui-tool-btn" type="button">Fetch</button>
        <button id="editor-url-cancel" class="sdui-tool-btn" type="button">Cancel</button>
      </div>
      <div id="editor-host"></div>
      <div id="editor-status" class="ok" role="status">Valid — rendering live</div>
    </aside>
    <main id="swagger-ui" aria-live="polite"></main>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5.32.8/swagger-ui-bundle.js"
          integrity="sha384-IKpAWwsTL0pcw7/Amtnt2eXF4P1BK64WNuY2E/RG15SWLUW5HXzFuyqCSAr/DP8C" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/codemirror.min.js"
          integrity="sha384-C7K/Pjo6rtJFtYWv792/hBOrCLhjcAa319ZhwjrDE8zCMEWglI7+S1CUEKD+q6uF" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.20/mode/yaml/yaml.min.js"
          integrity="sha384-9q49Jm3hZMwxEMLImsxPxLiaptHpFz1PVa26Dg6SVIO+rj5kx0cgOM2+4ikKJFH9" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"
          integrity="sha384-+pxiN6T7yvpryuJmE1gM9PX7yQit15auDb+ZwwvJOd/4be2Cie5/IuVXgQb/S9du" crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>
</html>
